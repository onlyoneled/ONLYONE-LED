[build]
  publish = "."

# 업로드 이미지 — 파일명에 타임스탬프 포함이므로 1년 캐시
[[headers]]
  for = "/images/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 슬라이드 이미지 — 1주일 캐시
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# JSON 데이터 — 항상 최신본 확인
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# HTML — 항상 최신본 확인
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
